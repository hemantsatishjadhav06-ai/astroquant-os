# AstroQuant OS — local infrastructure (docs/003 Deployment).
# Brings up TimescaleDB (Postgres+Timescale), MongoDB, Redis, and n8n.
# pgvector is available via the timescaledb-ha image (includes pgvector).
services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: astroquant
      POSTGRES_PASSWORD: astroquant
      POSTGRES_DB: astroquant
    ports: ["5432:5432"]
    volumes:
      - aq_pg:/home/postgres/pgdata/data
      - ./sql:/docker-entrypoint-initdb.d:ro   # 001_extensions.sql runs on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astroquant"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["aq_mongo:/data/db"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["aq_redis:/data"]

  n8n:
    image: n8nio/n8n:latest
    ports: ["5678:5678"]
    environment:
      N8N_PORT: 5678
      GENERIC_TIMEZONE: Asia/Kolkata
    volumes: ["aq_n8n:/home/node/.n8n"]
    depends_on: [timescaledb, redis]

volumes:
  aq_pg:
  aq_mongo:
  aq_redis:
  aq_n8n:
